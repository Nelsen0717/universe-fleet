<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Claude Code — 我的宇宙艦隊（互動體驗）</title>
<style>
  :root{
    --bg: #f5f5f4;
    --panel: #ffffff;
    --line: #dcdcda;
    --line-soft: #e8e8e6;
    --text: #1c1c1a;
    --text-dim: #6b6b68;
    --text-faint: #9a9a96;
    --bubble-user: #efeee9;
    --bubble-ai: #ffffff;
    --accent: #1c1c1a;
    --mono: "SF Mono", "Menlo", "Consolas", monospace;
    --sans: -apple-system, "PingFang TC", "Noto Sans TC", "Helvetica Neue", Arial, sans-serif;
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
    height:100%;
    overflow-x:hidden;
  }
  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    padding:24px 12px 40px;
  }

  /* ---------- 外層說明 ---------- */
  .stage-label{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.06em;
    color:var(--text-faint);
    text-transform:uppercase;
    margin-bottom:10px;
  }

  /* ---------- 手機殼容器 ---------- */
  .phone{
    width:390px;
    max-width:100%;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    height:780px;
    max-height:82vh;
    position:relative;
  }

  /* ---------- 頂部標題列 ---------- */
  .titlebar{
    flex:0 0 auto;
    padding:14px 16px 10px;
    border-bottom:1px solid var(--line);
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .titlebar .row{
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .titlebar h1{
    font-size:14px;
    font-weight:600;
    margin:0;
    letter-spacing:0.01em;
  }
  .titlebar .sim-tag{
    font-family:var(--mono);
    font-size:10px;
    color:var(--text-faint);
    border:1px solid var(--line);
    border-radius:3px;
    padding:1px 6px;
    white-space:nowrap;
  }
  .titlebar .subtitle{
    font-size:11px;
    color:var(--text-faint);
    font-family:var(--mono);
  }

  /* ---------- 章節字卡 ---------- */
  .chapter-card{
    flex:0 0 auto;
    display:none;
    align-items:center;
    gap:10px;
    padding:9px 16px;
    border-bottom:1px solid var(--line-soft);
    background:var(--bg);
  }
  .chapter-card.show{ display:flex; }
  .chapter-num{
    font-family:var(--mono);
    font-size:11px;
    color:var(--text-dim);
    border:1px solid var(--line);
    border-radius:3px;
    padding:1px 6px;
  }
  .chapter-title{
    font-size:12px;
    font-weight:600;
    color:var(--text);
  }

  /* ---------- 訊息串 ---------- */
  .thread{
    flex:1 1 auto;
    overflow-y:auto;
    padding:16px 14px 12px;
    display:flex;
    flex-direction:column;
    gap:14px;
    scroll-behavior:smooth;
  }
  .thread::-webkit-scrollbar{ width:0; }

  .msg{
    display:flex;
    flex-direction:column;
    max-width:86%;
    opacity:0;
    transform:translateY(6px);
    animation:msgIn 0.32s ease forwards;
  }
  @keyframes msgIn{
    to{ opacity:1; transform:translateY(0); }
  }
  .msg.user{ align-self:flex-end; align-items:flex-end; }
  .msg.ai{ align-self:flex-start; align-items:flex-start; }

  .msg .who{
    font-family:var(--mono);
    font-size:10px;
    color:var(--text-faint);
    margin-bottom:4px;
    padding:0 2px;
  }

  .bubble{
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px 13px;
    font-size:13.5px;
    line-height:1.65;
    white-space:pre-wrap;
    word-break:break-word;
  }
  .msg.user .bubble{
    background:var(--bubble-user);
  }
  .msg.ai .bubble{
    background:var(--bubble-ai);
  }

  /* 檔案卡樣式（fleet-config.md 產出） */
  .filecard{
    border:1px solid var(--line);
    border-radius:10px;
    background:#fafaf9;
    padding:0;
    overflow:hidden;
    font-size:12.5px;
    max-width:100%;
  }
  .filecard .fc-head{
    display:flex;
    align-items:center;
    gap:6px;
    padding:8px 12px;
    border-bottom:1px solid var(--line-soft);
    font-family:var(--mono);
    font-size:11px;
    color:var(--text-dim);
  }
  .filecard .fc-dot{
    width:6px; height:6px; border-radius:50%;
    background:var(--text-faint);
    flex:0 0 auto;
  }
  .filecard .fc-body{
    padding:10px 12px;
    line-height:1.7;
    color:var(--text);
  }
  .filecard .fc-body b{ font-weight:600; }
  .filecard table{
    width:100%;
    border-collapse:collapse;
    margin-top:6px;
    font-size:12px;
  }
  .filecard td{
    border-top:1px solid var(--line-soft);
    padding:4px 2px;
    vertical-align:top;
  }
  .filecard td:first-child{ color:var(--text-dim); width:38%; }

  /* 守門員報告卡 */
  .reportcard{
    border:1px solid var(--line);
    border-radius:10px;
    background:#fafaf9;
    padding:10px 12px;
    font-family:var(--mono);
    font-size:11.5px;
    line-height:1.85;
    color:var(--text);
    white-space:pre-wrap;
  }
  .reportcard .ok{ color:#2f5d3a; }
  .reportcard .verdict{
    margin-top:4px;
    padding-top:6px;
    border-top:1px solid var(--line-soft);
    font-weight:600;
  }

  /* 打字中省略號 */
  .typing-dots{
    display:inline-flex;
    gap:3px;
    align-items:center;
    padding:2px 4px;
  }
  .typing-dots span{
    width:5px; height:5px; border-radius:50%;
    background:var(--text-faint);
    animation:blink 1.1s infinite ease-in-out;
  }
  .typing-dots span:nth-child(2){ animation-delay:0.15s; }
  .typing-dots span:nth-child(3){ animation-delay:0.3s; }
  @keyframes blink{
    0%,80%,100%{ opacity:0.25; }
    40%{ opacity:1; }
  }

  /* 游標 */
  .caret{
    display:inline-block;
    width:2px;
    height:1em;
    background:var(--text);
    vertical-align:text-bottom;
    margin-left:1px;
    animation:caretBlink 0.9s steps(1) infinite;
  }
  @keyframes caretBlink{
    50%{ opacity:0; }
  }

  /* 發佈按鈕 / 確認鍵 */
  .action-row{
    display:flex;
    gap:8px;
    margin-top:2px;
  }
  .btn{
    font-family:var(--sans);
    font-size:12.5px;
    font-weight:600;
    padding:8px 16px;
    border-radius:8px;
    border:1px solid var(--text);
    background:var(--text);
    color:#fff;
    cursor:pointer;
    transition:opacity 0.15s;
  }
  .btn:hover{ opacity:0.85; }
  .btn:disabled{
    opacity:0.35;
    cursor:default;
  }
  .btn.ghost{
    background:transparent;
    color:var(--text);
  }
  .published-tag{
    font-family:var(--mono);
    font-size:11.5px;
    color:#2f5d3a;
    border:1px solid #cfe0d2;
    background:#f3f8f4;
    border-radius:6px;
    padding:5px 10px;
    display:inline-block;
  }

  /* 互動選擇按鈕（對話框裡真的能點） */
  .choice-wrap{ display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
  .choice-row{ display:flex; flex-direction:column; gap:8px; align-items:stretch; }
  .choice-btn{
    font-family:var(--sans);
    font-size:13px;
    font-weight:600;
    padding:10px 15px;
    border-radius:9px;
    border:1px solid var(--text);
    background:#fff;
    color:var(--text);
    cursor:pointer;
    text-align:right;
    transition:background 0.15s, color 0.15s;
  }
  .choice-btn:hover{ background:var(--text); color:#fff; }
  .choice-btn.ghost{ border-color:var(--line); color:var(--text-dim); font-weight:500; }
  .choice-btn.ghost:hover{ background:var(--text-dim); color:#fff; border-color:var(--text-dim); }
  .choice-hint{
    font-family:var(--mono);
    font-size:10px;
    color:var(--text-faint);
    text-align:right;
  }
  .picked-choice{ font-size:13.5px; }
  .replay-inline{ display:flex; justify-content:center; width:100%; }
  .replay-inline-btn{
    font-family:var(--sans);
    font-size:13px;
    font-weight:600;
    padding:10px 20px;
    border-radius:9px;
    border:1px solid var(--text);
    background:transparent;
    color:var(--text);
    cursor:pointer;
  }
  .replay-inline-btn:hover{ background:var(--text); color:#fff; }

  /* ---------- 底部輸入列 ---------- */
  .inputbar{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    gap:8px;
    padding:10px 12px;
    border-top:1px solid var(--line);
    background:var(--panel);
  }
  .inputbar .fake-input{
    flex:1;
    border:1px solid var(--line);
    border-radius:8px;
    padding:9px 12px;
    font-size:13px;
    color:var(--text);
    background:#fbfbfa;
    min-height:18px;
    line-height:1.4;
  }
  .inputbar .fake-input.placeholder{
    color:var(--text-faint);
  }
  .inputbar .send-dot{
    width:30px; height:30px;
    border-radius:50%;
    border:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:center;
    flex:0 0 auto;
    color:var(--text-dim);
    font-size:14px;
  }

  /* ---------- 播放控制條（demo 外殼、非聊天視窗本身） ---------- */
  .controls{
    width:390px;
    max-width:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:14px;
    padding:10px 4px 0;
    border-top:1px solid var(--line);
  }
  .controls .left{
    display:flex;
    gap:8px;
  }
  .ctrl-btn{
    font-family:var(--mono);
    font-size:11px;
    color:var(--text-dim);
    background:transparent;
    border:1px solid var(--line);
    border-radius:6px;
    padding:6px 11px;
    cursor:pointer;
  }
  .ctrl-btn:hover{ background:var(--bg); }
  .progress-label{
    font-family:var(--mono);
    font-size:10.5px;
    color:var(--text-faint);
  }

  .footnote{
    width:390px;
    max-width:100%;
    text-align:center;
    font-size:10.5px;
    color:var(--text-faint);
    margin-top:10px;
    line-height:1.6;
  }
</style>
</head>
<body>

  <div class="stage-label">畫面模擬 · 你可以點著玩</div>

  <div class="phone">
    <div class="titlebar">
      <div class="row">
        <h1>Claude Code — 我的宇宙艦隊</h1>
        <span class="sim-tag">互動體驗</span>
      </div>
      <div class="subtitle" id="subtitle-text">領航員 · 待命中</div>
    </div>

    <div class="chapter-card" id="chapter-card">
      <span class="chapter-num" id="chapter-num">●</span>
      <span class="chapter-title" id="chapter-title">開始</span>
    </div>

    <div class="thread" id="thread"></div>

    <div class="inputbar">
      <div class="fake-input placeholder" id="fake-input">傳訊息給艦隊…</div>
      <div class="send-dot">↑</div>
    </div>
  </div>

  <div class="controls">
    <div class="left">
      <button class="ctrl-btn" id="btn-replay">重玩</button>
      <button class="ctrl-btn" id="btn-skip">快轉打字</button>
    </div>
    <div class="progress-label" id="progress-label">互動體驗</div>
  </div>

  <div class="footnote">點著走、會分支：先問你有沒有帳號 → 掃描或訪談，一路到出圖、發佈、看數據、排下一批 · 隨時可重玩<br>這是產品畫面模擬，實際體驗發生在你自己的 Claude Code 裡</div>

<script>
(function(){
  "use strict";

  var thread = document.getElementById("thread");
  var subtitleEl = document.getElementById("subtitle-text");
  var chapterCard = document.getElementById("chapter-card");
  var chapterNum = document.getElementById("chapter-num");
  var chapterTitle = document.getElementById("chapter-title");
  var fakeInput = document.getElementById("fake-input");
  var progressLabel = document.getElementById("progress-label");
  var btnReplay = document.getElementById("btn-replay");
  var btnSkip = document.getElementById("btn-skip");

  var playToken = 0;
  var fastMode = false;
  var isPlaying = false;
  var queue = [];

  // ---------------- 基礎工具 ----------------
  function clearThread(){ thread.innerHTML = ""; }
  function scrollToBottom(){ thread.scrollTop = thread.scrollHeight + 999; }
  function wait(ms, token, cb){
    var t = fastMode ? Math.min(ms, 60) : ms;
    setTimeout(function(){ if (token === playToken) cb(); }, t);
  }
  function pause(ms, token, cb){ wait(ms, token, cb); }

  function setPhase(phase, sub){
    chapterCard.classList.add("show");
    chapterNum.textContent = "●";
    chapterTitle.textContent = phase;
    progressLabel.textContent = phase;
    if (sub) subtitleEl.textContent = sub;
  }
  function setFakeInput(text, isPlaceholder){
    fakeInput.textContent = text;
    if (isPlaceholder) fakeInput.classList.add("placeholder");
    else fakeInput.classList.remove("placeholder");
  }

  function addUserMessage(text, token, cb){
    var msg = document.createElement("div");
    msg.className = "msg user";
    msg.innerHTML = '<div class="who">你</div><div class="bubble"></div>';
    thread.appendChild(msg);
    msg.querySelector(".bubble").textContent = text;
    scrollToBottom();
    wait(fastMode ? 80 : 260, token, cb);
  }

  function typeOut(text, el, caretEl, token, cb){
    var i = 0;
    var charDelay = fastMode ? 1 : 16;
    var chunk = fastMode ? 6 : 1;
    function step(){
      if (token !== playToken) return;
      if (i >= text.length){
        if (caretEl && caretEl.parentNode) caretEl.parentNode.removeChild(caretEl);
        scrollToBottom(); cb(); return;
      }
      var n = Math.min(i + chunk, text.length);
      el.textContent += text.slice(i, n);
      i = n; scrollToBottom();
      setTimeout(step, charDelay);
    }
    step();
  }

  function addAiTypingThenText(text, token, cb, opts){
    opts = opts || {};
    var who = opts.who || "艦隊";
    var msg = document.createElement("div");
    msg.className = "msg ai";
    msg.innerHTML = '<div class="who">' + who + '</div><div class="bubble"><span class="typing-dots"><span></span><span></span><span></span></span></div>';
    thread.appendChild(msg);
    scrollToBottom();
    var bubble = msg.querySelector(".bubble");
    var thinkMs = fastMode ? 90 : (opts.thinkMs || 900);
    wait(thinkMs, token, function(){
      bubble.innerHTML = '<span class="typed"></span><span class="caret"></span>';
      typeOut(text, bubble.querySelector(".typed"), bubble.querySelector(".caret"), token, cb);
    });
  }

  function addAiCard(innerHtml, token, cb, opts){
    opts = opts || {};
    var who = opts.who || "艦隊";
    var msg = document.createElement("div");
    msg.className = "msg ai";
    msg.style.maxWidth = "94%";
    msg.innerHTML = '<div class="who">' + who + '</div>';
    var wrap = document.createElement("div");
    wrap.innerHTML = innerHtml;
    msg.appendChild(wrap.firstElementChild);
    thread.appendChild(msg);
    scrollToBottom();
    wait(fastMode ? 100 : 500, token, cb);
  }

  // ---------------- 互動：選擇按鈕（要點才會走） ----------------
  function addChoice(options, token, cb){
    var msg = document.createElement("div");
    msg.className = "msg user";
    msg.innerHTML = '<div class="who">你</div>';
    var holder = document.createElement("div");
    holder.className = "choice-wrap";
    var row = document.createElement("div");
    row.className = "choice-row";
    var hint = document.createElement("div");
    hint.className = "choice-hint";
    hint.textContent = "👆 選一個往下走";
    options.forEach(function(opt){
      var b = document.createElement("button");
      b.className = "choice-btn" + (opt.ghost ? " ghost" : "");
      b.textContent = opt.label;
      b.addEventListener("click", function(){
        if (msg._picked) return;
        msg._picked = true;
        var bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.innerHTML = '<span class="picked-choice">' + opt.label + '</span>';
        msg.innerHTML = '<div class="who">你</div>';
        msg.appendChild(bubble);
        scrollToBottom();
        if (opt.steps && opt.steps.length) playFront(opt.steps);
        cb();
      });
      row.appendChild(b);
    });
    holder.appendChild(row);
    holder.appendChild(hint);
    msg.appendChild(holder);
    thread.appendChild(msg);
    scrollToBottom();
    // 刻意不 auto-advance：互動的重點是使用者自己點
  }

  // ---------------- 卡片內容（全淺色、配合白底聊天） ----------------
  var fleetConfigCard =
    '<div class="filecard"><div class="fc-head"><span class="fc-dot"></span>fleet-config.md · 已建立</div>' +
    '<div class="fc-body"><b>定位一句話</b>：用白話帶大家搞懂 AI、只講真的能不能用。' +
    '<table><tr><td>選題拍板</td><td>你（永遠不可讓渡）</td></tr>' +
    '<tr><td>發佈鍵</td><td>你（永遠不可讓渡）</td></tr>' +
    '<tr><td>草稿</td><td>艦隊先生、你改</td></tr>' +
    '<tr><td>檢查</td><td>每篇發前都先過一輪</td></tr></table></div></div>';

  var healthCard =
    '<div class="filecard"><div class="fc-head"><span class="fc-dot"></span>health-check.md · 已建立</div>' +
    '<div class="fc-body"><b>你的聲線</b>：短句、愛用反問、少用形容詞。<br>' +
    '<b>三個做得好</b>：選題貼近讀者、開場有鉤子、敢給判斷。<br>' +
    '<b>三個可以修</b>：發文太不規律、有幾篇太像新聞轉述、金句可以收更緊。<br>' +
    '<span style="color:var(--text-dim);">→ 先補「發文節奏」這一個就好。</span></div></div>';

  var reportCardHtml =
    '<div class="reportcard">' +
    '<span class="ok">✅ 高風險罐頭句型：沒抓到，讀起來不會太「AI 腔」。</span>\n' +
    '<span class="ok">✅ 字數：106 字，在 500 字上限內。</span>\n' +
    '<span class="ok">✅ 禁詞清單：沒踩到。</span>\n' +
    '<span class="ok">✅ 段落斷行：閱讀節奏可以。</span>\n' +
    '<div class="verdict">結論：四項都過，可以發了。</div></div>';

  var reportDataCard =
    '<div class="filecard"><div class="fc-head"><span class="fc-dot"></span>白話週報 · 昨天那篇</div>' +
    '<div class="fc-body">觸及 1,240 · 留言 18 · 轉發 9<br>' +
    '留言率比你的平均高——「先想問題、再挑工具」這種戳到痛點的，比純講工具的更多人回。<br>' +
    '<span style="color:#2f5d3a;">→ 下週往「問題意識」這根支柱加碼。</span></div></div>';

  var topicsCard =
    '<div class="filecard"><div class="fc-head"><span class="fc-dot"></span>下一批選題 · 3 張</div>' +
    '<div class="fc-body">1. 你的 AI 工具清單、其實可以砍一半<br>' +
    '2. 我每天只花 15 分鐘管一個帳號、靠的是這套流程<br>' +
    '3. 學 AI 學到焦慮？先問自己這一題<br>' +
    '<span style="color:var(--text-faint);">每張都指回你的真實經驗，不是憑空生的題目。</span></div></div>';

  var draftText = "最近好多人問我要不要學 AI。\n\n老實說我的答案很無聊：先別急著挑工具，先想清楚你要解決什麼問題。\n\n工具三個月換一輪，問題意識不會。你連自己卡在哪都講不清楚，學再多技巧也是白搭。\n\n想清楚了，工具隨便選都能用。";

  // ---------------- 分支內容 ----------------
  function branchScan(){
    return [
      function(t,n){ setPhase("健檢", "領航員 · 掃描你的帳號"); n(); },
      function(t,n){ addAiTypingThenText("好，那先幫你健檢。把你最近幾篇貼文貼給我看看——複製貼上就行。", t, n, {who:"領航員", thinkMs:700}); },
      function(t,n){ addUserMessage("（貼上最近 8 篇貼文）", t, n); },
      function(t,n){ addAiTypingThenText("讀完了。你的聲線我抓到了，也標了三個可以修的地方：", t, n, {who:"領航員", thinkMs:1000}); },
      function(t,n){ addAiCard(healthCard, t, n, {who:"領航員"}); },
      function(t,n){ addAiTypingThenText("這份健檢會存起來、當你的聲線種子——之後每個艦員都照它做事，你不用再貼一次。", t, n, {who:"領航員", thinkMs:600}); },
      function(t,n){ pause(fastMode?120:800, t, n); }
    ];
  }

  function branchInterview(){
    return [
      function(t,n){ setPhase("訪談", "領航員 · 首次啟動"); n(); },
      function(t,n){ addAiTypingThenText("好，那我們從頭聊。你主要想在哪個平台寫？大概多久發一次？", t, n, {who:"領航員", thinkMs:800}); },
      function(t,n){ addUserMessage("Threads 為主，一週想發個兩三篇", t, n); },
      function(t,n){ addAiTypingThenText("收到。接下來這題最重要——發佈鍵，貼文送出去那一下，永遠是你按，艦隊不會自動發。", t, n, {who:"領航員", thinkMs:800}); },
      function(t,n){
        addChoice([
          { label:"我同意，發佈鍵永遠我按", steps:[] },
          { label:"為什麼不能自動發？", ghost:true, steps:[
            function(t2,n2){ addAiTypingThenText("因為那是你的名字、你的信任。AI 會把稿備到最好，但按下去代表「我認可」——這一下只能是你。這也是這套系統跟隨便一個自動發文工具最大的差別。", t2, n2, {who:"領航員", thinkMs:900}); }
          ]}
        ], t, n);
      },
      function(t,n){ addAiTypingThenText("記下了。藍圖整理好了，你看一下：", t, n, {who:"領航員", thinkMs:600}); },
      function(t,n){ addAiCard(fleetConfigCard, t, n, {who:"領航員"}); },
      function(t,n){ pause(fastMode?120:800, t, n); }
    ];
  }

  function branchWithImage(){
    return [
      function(t,n){ setPhase("出圖", "美術 · 照你的品牌做圖"); n(); },
      function(t,n){ addAiTypingThenText("挑你這篇最想被記住的一句——「工具三個月換一輪，問題意識不會」，照你的品牌做成一張卡。不是通用 AI 圖、是你這個帳號的圖：", t, n, {who:"美術", thinkMs:900}); },
      function(t,n){ addAiCard('<div style="border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff;"><img src="assets/demo-card.png" alt="金句卡" style="width:100%;display:block;"></div>', t, n, {who:"美術"}); },
      function(t,n){ pause(fastMode?120:800, t, n); }
    ];
  }

  function branchTextOnly(){
    return [
      function(t,n){ addAiTypingThenText("好，這篇就走純文字帖——一樣能發，圖之後想配再說。", t, n, {who:"美術", thinkMs:600}); },
      function(t,n){ pause(fastMode?100:500, t, n); }
    ];
  }

  // 發佈選擇（可重複改稿的小迴圈）
  function publishChoice(t, n){
    addChoice([
      { label:"發佈", steps:[] },
      { label:"再改一版", ghost:true, steps:[
        function(t2,n2){ addAiTypingThenText("好，最後一句我收得更淡一點：「想清楚了，工具隨便選都能用。」", t2, n2, {who:"寫手", thinkMs:700}); },
        function(t2,n2){ publishChoice(t2, n2); }
      ]}
    ], t, n);
  }

  // ---------------- 主流程 ----------------
  function buildFlow(){
    var s = [];
    s.push(function(t,n){ setPhase("開始", "領航員 · 待命中"); n(); });
    s.push(function(t,n){ addAiTypingThenText("我是領航員。花兩分鐘，帶你走一遍你上完課每天會做的事。先問你一句——", t, n, {who:"領航員", thinkMs:700}); });
    s.push(function(t,n){ addAiTypingThenText("你是已經有帳號想升級、還是想從零開始一個新的？", t, n, {who:"領航員", thinkMs:600}); });
    // 選擇 1：有沒有現有帳號 → 掃描 / 訪談
    s.push(function(t,n){
      addChoice([
        { label:"我有現有帳號", steps: branchScan() },
        { label:"全新帳號", steps: branchInterview() }
      ], t, n);
    });
    // 收斂：出稿
    s.push(function(t,n){ setPhase("出稿", "寫手 · 用你的聲線"); setFakeInput("幫我寫一篇：最近好多人問我要不要學 AI", false); n(); });
    s.push(function(t,n){ addUserMessage("幫我寫一篇：最近好多人問我要不要學 AI", t, n); });
    s.push(function(t,n){ setFakeInput("傳訊息給艦隊…", true); n(); });
    s.push(function(t,n){ addAiTypingThenText(draftText, t, n, {who:"寫手", thinkMs:1000}); });
    s.push(function(t,n){ pause(fastMode?120:800, t, n); });
    // 把關
    s.push(function(t,n){ setPhase("把關", "守門員 · 接手檢查"); n(); });
    s.push(function(t,n){ addAiTypingThenText("草稿我接手了，跑一輪檢查。", t, n, {who:"守門員", thinkMs:500}); });
    s.push(function(t,n){ addAiCard(reportCardHtml, t, n, {who:"守門員"}); });
    s.push(function(t,n){ addAiTypingThenText("四項都過、沒踩到雷。要不要幫這篇配一張圖？", t, n, {who:"守門員", thinkMs:500}); });
    // 選擇 2：配圖 / 純文字
    s.push(function(t,n){
      addChoice([
        { label:"要，配一張金句卡", steps: branchWithImage() },
        { label:"先純文字帖", ghost:true, steps: branchTextOnly() }
      ], t, n);
    });
    // 發佈（互動：使用者按發佈、可先改一版）
    s.push(function(t,n){ setPhase("發佈", "等你按下發佈"); n(); });
    s.push(function(t,n){ addAiTypingThenText("要發嗎？", t, n, {who:"艦隊", thinkMs:400}); });
    s.push(function(t,n){ publishChoice(t, n); });
    s.push(function(t,n){
      var msg = document.createElement("div");
      msg.className = "msg ai";
      msg.innerHTML = '<div class="who">艦隊</div><div class="bubble"><span class="published-tag">已發佈到 Threads ✓</span></div>';
      thread.appendChild(msg); scrollToBottom();
      wait(fastMode?100:500, t, n);
    });
    s.push(function(t,n){ pause(fastMode?100:700, t, n); });
    // 看數據
    s.push(function(t,n){ setPhase("看數據", "隔天 · 分析師"); n(); });
    s.push(function(t,n){ addAiTypingThenText("昨天那篇的成績出來了——GPT 不會記得你上一篇發了什麼，我會。", t, n, {who:"分析師", thinkMs:700}); });
    s.push(function(t,n){ addAiCard(reportDataCard, t, n, {who:"分析師"}); });
    s.push(function(t,n){ pause(fastMode?120:800, t, n); });
    // 下一批
    s.push(function(t,n){ setPhase("下一批", "企劃 · 依數據排選題"); n(); });
    s.push(function(t,n){ addAiTypingThenText("照昨天的成績，我先幫你排好下一批——坐下來挑一張就好：", t, n, {who:"企劃", thinkMs:700}); });
    s.push(function(t,n){ addAiCard(topicsCard, t, n, {who:"企劃"}); });
    s.push(function(t,n){ pause(fastMode?120:800, t, n); });
    // 收尾 + 重玩
    s.push(function(t,n){ setPhase("一整圈", "劇情走完 · 換你試"); n(); });
    s.push(function(t,n){ addAiTypingThenText("這就是一整圈——健檢/訪談、出文、出圖、發佈、看數據、排下一批。每轉一圈，這套系統就更懂你的讀者。AI 備好一切，發佈的手永遠是你的。", t, n, {who:"艦隊", thinkMs:600}); });
    s.push(function(t,n){
      var msg = document.createElement("div");
      msg.className = "msg ai";
      msg.style.alignSelf = "center";
      msg.style.maxWidth = "100%";
      var holder = document.createElement("div");
      holder.className = "replay-inline";
      var b = document.createElement("button");
      b.className = "replay-inline-btn";
      b.textContent = "🔄 換條路再玩一次";
      b.addEventListener("click", function(){ start(); });
      holder.appendChild(b);
      msg.appendChild(holder);
      thread.appendChild(msg); scrollToBottom();
      n();
    });
    return s;
  }

  // ---------------- 引擎：可分支的 queue ----------------
  function runQueue(token){
    function loop(){
      if (token !== playToken) return;
      if (!queue.length){ isPlaying = false; return; }
      var fn = queue.shift();
      fn(token, loop);
    }
    loop();
  }
  function playFront(list){
    for (var i = list.length - 1; i >= 0; i--) queue.unshift(list[i]);
  }

  function start(){
    playToken++;
    var token = playToken;
    isPlaying = true;
    clearThread();
    setFakeInput("傳訊息給艦隊…", true);
    queue = buildFlow();
    runQueue(token);
  }

  btnReplay.addEventListener("click", function(){
    fastMode = false;
    btnSkip.textContent = "快轉打字";
    start();
  });
  btnSkip.addEventListener("click", function(){
    fastMode = true;
    btnSkip.textContent = "快轉中";
    start();
  });

  start();

})();
</script>
