<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>課前裝備發放 — 宇宙艦隊</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 常駐嚮導列：老師頭像縮圖｜第 X／5 關・關名｜繼續 -->
<div id="guide-bar" class="guide-bar-hidden">
  <img id="guide-bar-avatar" src="assets/mentor-portrait.png" alt="Nelsen 老師">
  <span id="guide-bar-label">第 1／5 關</span>
  <button id="guide-bar-continue-btn" type="button">繼續</button>
</div>

<div id="scene-root">

  <!-- 0. 開場字卡 -->
  <section id="scene-cover" class="scene">
    <div class="cover-inner">
      <h1 id="cover-title">課前裝備發放</h1>
      <p id="cover-subtitle">跟著 Nelsen 老師、把你的 AI 團隊裝上艦</p>
    </div>
  </section>

  <!-- 1. 任命書 -->
  <section id="scene-orders" class="scene">
    <div class="orders-shell">
      <div class="orders-stamp orders-stamp-pending" id="orders-stamp">未蓋章</div>
      <p id="orders-naming-line">艦長，請留下你的名字：</p>
      <input id="orders-name-input" type="text" placeholder="輸入你的名字" maxlength="20">
      <div>
        <button id="orders-stamp-btn" type="button" class="btn-primary">蓋章</button>
      </div>
    </div>
  </section>

  <!-- 2. 老師開場（三句、逐句點按） -->
  <section id="scene-mentor-intro" class="scene">
    <div class="orders-shell">
      <div class="mentor-row">
        <img id="mentor-avatar" src="assets/mentor-portrait.png" alt="Nelsen 老師">
        <span class="mentor-nameplate">Nelsen 老師</span>
      </div>
      <p id="mentor-intro-line" class="mentor-line"></p>
      <button id="mentor-intro-next-btn" type="button" class="btn-primary">繼續</button>
    </div>
  </section>

  <!-- 3. 關卡頁（單一容器、內容由 JS 動態換） -->
  <section id="scene-quest" class="scene">
    <div class="quest-shell">
      <p id="quest-mentor-line" class="quest-mentor-line"></p>
      <div class="quest-card">
        <div class="quest-card-title" id="quest-title"></div>
        <div class="quest-trio">
          <div class="quest-trio-block">
            <div class="quest-trio-label">畫面模擬</div>
            <div id="quest-sim"></div>
          </div>
          <div class="quest-trio-block">
            <div class="quest-trio-label">你做的動作</div>
            <div id="quest-action-desc"></div>
          </div>
          <div class="quest-trio-block">
            <div class="quest-trio-label">你應該看到</div>
            <div id="quest-expect"></div>
          </div>
        </div>
        <div class="quest-actions" id="quest-actions"></div>
        <div class="quest-hint" id="quest-hint"></div>
      </div>
    </div>
  </section>

  <!-- 4. 艦員甦醒小卡 -->
  <section id="scene-awaken" class="scene">
    <div class="awaken-shell">
      <img id="awaken-portrait" class="awaken-portrait" src="" alt="">
      <div id="awaken-name" class="awaken-name"></div>
      <div id="awaken-role" class="awaken-role"></div>
      <p id="awaken-line" class="awaken-line"></p>
      <button id="awaken-continue-btn" type="button" class="btn-primary">繼續</button>
    </div>
  </section>

  <!-- 5. 全艦甦醒慶祝 -->
  <section id="scene-celebration" class="scene">
    <div class="celebration-inner">
      <div class="celebration-title">全艦甦醒</div>
      <div id="celebration-crew"></div>
      <p class="celebration-message" id="celebration-message">五位艦員全部就位，艦長。</p>
      <button id="celebration-continue-btn" type="button" class="btn-primary btn-on-paper">收尾</button>
    </div>
  </section>

  <!-- 6. 證書 -->
  <section id="scene-certificate" class="scene">
    <div class="certificate-shell">
      <div class="certificate-eyebrow">裝備完成證書</div>
      <div class="certificate-name" id="certificate-name"></div>
      <p class="certificate-body">你已完成課前裝備發放，你的 AI 團隊已經在艦上待命。開課那天，帶著它來。</p>
      <div class="certificate-mentor">— Nelsen 老師</div>
    </div>
  </section>

</div>

<!-- 轉場字卡 -->
<div id="transition-card">
  <div id="transition-card-text"></div>
</div>

<script src="js/app.js"></script>
</body>
</html>
